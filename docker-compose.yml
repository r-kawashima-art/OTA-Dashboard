services:
  db:
    image: postgis/postgis:16-3.4
    container_name: ota_db
    environment:
      POSTGRES_USER: ota
      POSTGRES_PASSWORD: ota_secret
      POSTGRES_DB: ota_worldmap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ota -d ota_worldmap"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
